<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehar & Akash</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #111;
        }
        .split {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
            position: relative;
            cursor: pointer;
            text-decoration: none;
        }
        /* Left Side - Akash */
        .akash {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
        }
        /* Right Side - Mehar */
        .mehar {
            background: linear-gradient(135deg, #2c3e50, #fd746c);
            color: #fff;
        }
        .split:hover {
            width: 55%;
        }
        .split:hover .overlay {
            background-color: rgba(0, 0, 0, 0.2);
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            transition: all 0.5s ease;
            z-index: 1;
        }
        .content {
            z-index: 2;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1.2rem;
            opacity: 0.8;
            font-style: italic;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 25px;
            border: 2px solid #fff;
            background: transparent;
            color: #fff;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
            display: inline-block;
        }
        .split:hover .btn {
            background-color: #fff;
            color: #111;
        }
        @media(max-width: 768px) {
            body {
                flex-direction: column;
            }
            .split {
                width: 100%;
                height: 50%;
            }
            .split:hover {
                width: 100%;
                height: 55%;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="split akash" onclick="checkSecurePassword('akash')">
        <div class="overlay"></div>
        <div class="content">
            <h1>Akash</h1>
            <p>Welcome to my space</p>
            <div class="btn">Explore Me</div>
        </div>
    </div>

    <div class="split mehar" onclick="checkSecurePassword('mehar')">
        <div class="overlay"></div>
        <div class="content">
            <h1>Mehar</h1>
            <p>Welcome to my world</p>
            <div class="btn">Explore Me</div>
        </div>
    </div>

    <script>
        // Tumhare password '201304' ka MD5 encrypted string niche diya hai
        var secureHash = "e2c347db1f855d081f9b3b89fa72b78b";

        function checkSecurePassword(section) {
            var inputPassword = prompt("Enter Secret Password:");
            
            if (inputPassword !== null) {
                // Input kiye gaye password ko encrypt karke check karega
                var inputHash = CryptoJS.MD5(inputPassword).toString();
                
                if (inputHash === secureHash) {
                    if (section === 'akash') {
                        window.location.href = "akash.html";
                    } else if (section === 'mehar') {
                        window.location.href = "mehar.html";
                    }
                } else {
                    alert("Wrong Password! Access Denied ❌");
                }
            }
        }
    </script>

</body>
</html>
