<!DOCTYPE html>
<html lang="hi">

    <meta charset="UTF-8">

    <title>Our Secret Space ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #111; color: #fff; min-height: 100vh; overflow-x: hidden; }
        #app-root { min-height: 100vh; }
        
        /* --- LOGIN SCREEN --- */
        .login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #111; }
        .lock-box { text-align: center; background: rgba(255,255,255,0.05); padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); max-width: 400px; width: 90%; }
        .lock-box h2 { font-size: 1.8rem; margin-bottom: 20px; color: #ff758c; }
        .lock-box input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.2); background: transparent; color: #fff; font-size: 1.2rem; text-align: center; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .lock-box input:focus { border-color: #ff758c; box-shadow: 0 0 10px rgba(255,117,140,0.3); }
        .lock-box button { padding: 12px 30px; border: none; background: linear-gradient(45deg, #ff758c, #ff7eb3); color: #fff; border-radius: 25px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,117,140,0.4); }

        /* --- DASHBOARD SPLIT SCREEN --- */
        .dashboard-screen { display: flex; height: 100vh; }
        .split { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.5s ease; position: relative; cursor: pointer; }
        .akash-side { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #fff; }
        .mehar-side { background: linear-gradient(135deg, #2c3e50, #fd746c); color: #fff; }
        .split:hover { width: 55%; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: 1; }
        .split-content { z-index: 2; text-align: center; padding: 20px; }
        .split-content h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; }
        .split-content p { font-size: 1.2rem; opacity: 0.8; font-style: italic; }
        .explore-btn { margin-top: 20px; padding: 10px 25px; border: 2px solid #fff; background: transparent; color: #fff; border-radius: 30px; font-weight: bold; text-transform: uppercase; }
        @media(max-width: 768px) { .dashboard-screen { flex-direction: column; } .split { width: 100%; height: 50%; } .split:hover { height: 55%; width: 100%; } }

        /* --- COMMON VIEWS PANELS --- */
        .view-panel { padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 550px; width: 100%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); margin: auto; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; }
        .akash-border { border: 3px solid #00f2fe; } .mehar-border { border: 3px solid #ff758c; }
        .tagline { font-size: 1.1rem; margin-bottom: 25px; }
        .color-akash { color: #00f2fe; } .color-mehar { color: #ff758c; }
        .about-box { text-align: left; background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 15px; margin-bottom: 20px; line-height: 1.6; }
        .about-box h3 { margin-bottom: 10px; font-size: 1.3rem; }
        .fav-list { list-style: none; } .fav-list li { margin-bottom: 10px; font-size: 1.05rem; }
        .surprise-section { background: rgba(255, 117, 140, 0.1); border: 2px dashed #ff758c; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        .main-text { font-size: 1.8rem; color: #ff758c; font-weight: bold; margin-bottom: 12px; }
        .click-link { display: inline-block; font-size: 1.1rem; color: #00f2fe; text-decoration: underline; font-weight: bold; cursor: pointer; }
        .back-btn { display: inline-block; margin-top: 15px; padding: 12px 25px; color: #fff; text-decoration: none; border-radius: 25px; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); }
        
        /* --- BABE VIEW --- */
        .babe-panel { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #ff758c, #ff7eb3); text-align: center; padding: 20px; }
        .love-text { font-size: 3.5rem; font-weight: bold; text-shadow: 3px 3px 15px rgba(0,0,0,0.3); animation: heartBeat 1.5s infinite; margin-bottom: 40px; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .letter-container { max-width: 600px; width: 100%; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); padding: 35px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid rgba(255, 117, 140, 0.2); line-height: 1.8; margin: auto; }
        .letter-container h2 { text-align: center; color: #ff758c; font-size: 2rem; margin-bottom: 25px; text-shadow: 0 0 10px rgba(255, 117, 140, 0.4); }
        .letter-container p { margin-bottom: 20px; font-size: 1.1rem; text-align: justify; color: #f0e6e8; }
        .highlight { color: #ff7eb3; font-weight: bold; }

    </style>
</head>
